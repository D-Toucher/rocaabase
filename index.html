<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCAA Photography | Professional Service</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================
           BASE STYLES & RESET
        ========================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #050505;
            color: white;
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        @font-face {
            font-family: 'Orange Avenue';
            src: url('https://fonts.cdnfonts.com/s/16008/Orange Avenue.woff') format('woff');
        }

        /* =========================
           NAVBAR
        ========================= */
        nav {
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .nav-logo img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .nav-logo h2 {
            font-family: 'Orange Avenue', sans-serif;
            font-size: 20px;
        }

        /* =========================
           HERO & SECTIONS
        ========================= */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)),
                url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1400');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-content img.logo-main {
            width: 150px;
            margin-bottom: 20px;
        }

        .hero-title {
            font-family: 'Orange Avenue', sans-serif;
            font-size: clamp(35px, 8vw, 70px);
            margin-bottom: 20px;
            color: white;
        }

        section {
            padding: 60px 8%;
        }

        .section-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-title p {
            color: #888;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .gallery-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        /* Package Cards (Page 2) */
        .package-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            background: #111;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #d4af37;
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .card-price {
            color: #d4af37;
            font-weight: bold;
            font-size: 20px;
            margin: 10px 0;
        }

        /* Button Styles */
        .btn {
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-gold { background: #d4af37; color: black; }
        .btn-outline { border: 1px solid white; color: white; margin-top: 20px; background: transparent; }

        /* =========================
           PAGE HANDLING
        ========================= */
        #main-page { display: block; }
        #booking-page { display: none; padding-top: 100px; min-height: 100vh; }

        .booking-container {
            max-width: 500px;
            margin: 0 auto;
            background: #111;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #222;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-family: inherit;
        }

        .submit-wa {
            background: #25d366;
            color: white;
            width: 100%;
            padding: 15px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        footer { text-align: center; padding: 30px; color: #444; font-size: 12px; }
    </style>
</head>

<body>

    <nav>
        <div class="nav-logo" onclick="showPage('main')">
            <img src="https://i.postimg.cc/GpXtn7tY/IMG-8496.png" alt="Logo">
            <h2>ROCAA</h2>
        </div>
        <div class="nav-menu">
            <button class="btn btn-gold" onclick="showPage('booking')" style="padding: 8px 15px; font-size: 12px;">BOOK NOW</button>
        </div>
    </nav>

    <div id="main-page">
        <section class="hero">
            <div class="hero-content">
                <img src="https://i.postimg.cc/GpXtn7tY/IMG-8496.png" alt="Logo" class="logo-main">
                <h1 class="hero-title">ROCAA PHOTOGRAPHY</h1>
                <button class="btn btn-gold" onclick="showPage('booking')">START BOOKING</button>
            </div>
        </section>

        <section id="gallery">
            <div class="section-title">
                <h2>Our Gallery</h2>
                <p>Dokumentasi momen berharga klien kami.</p>
            </div>
            <div class="gallery-grid">
                <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=400" alt="1">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=400" alt="2">
                <img src="https://images.unsplash.com/photo-1537633552985-df8429e8048b?q=80&w=400" alt="3">
                <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?q=80&w=400" alt="4">
            </div>
            <center style="margin-top: 40px;">
                <button class="btn btn-outline" onclick="showPage('booking')">Lihat Paket & Harga</button>
            </center>
        </section>
    </div>

    <div id="booking-page">
        <section id="package-selection">
            <div class="section-title">
                <h2>Pilih Paket Anda</h2>
                <p>Klik paket yang Anda inginkan untuk mengisi formulir secara otomatis.</p>
            </div>
            <div class="package-grid">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80" alt="Wedding">
                    <h3>Wedding</h3>
                    <p class="card-price">Rp 3.500.000</p>
                    <button class="btn btn-gold" onclick="selectAndScroll('Wedding')">Pilih Wedding</button>
                </div>
                <div class="card">
                    <img src="https://i.postimg.cc/4xKB9qkz/IMG-8497.png" alt="Graduation">
                    <h3>Graduation</h3>
                    <p class="card-price">Rp 1.200.000</p>
                    <button class="btn btn-gold" onclick="selectAndScroll('Graduation')">Pilih Graduation</button>
                </div>
            </div>
        </section>

        <section id="form-section">
            <div class="section-title">
                <h2>Detail Pemesanan</h2>
            </div>
            <div class="booking-container">
                <form id="waForm">
                    <input type="text" id="name" placeholder="Nama Lengkap" required>
                    <input type="tel" id="phone" placeholder="Nomor WhatsApp" required>
                    <input type="date" id="date" required>
                    <select id="selectPaket" required>
                        <option value="">-- Konfirmasi Paket --</option>
                        <option value="Wedding">Wedding</option>
                        <option value="Graduation">Graduation</option>
                        <option value="Prewedding">Prewedding</option>
                    </select>
                    <textarea id="msg" placeholder="Pesan tambahan (Lokasi atau konsep acara)" rows="3"></textarea>
                    <button type="submit" class="submit-wa">Kirim Pesan Ke WhatsApp</button>
                    <center><button type="button" class="btn btn-outline" onclick="showPage('main')" style="border:none; color:#555;">Kembali ke Beranda</button></center>
                </form>
            </div>
        </section>
    </div>

    <footer>&copy; 2026 ROCAA Photography</footer>

    <script>
        // Fungsi pindah halaman
        function showPage(pageName) {
            if (pageName === 'main') {
                document.getElementById('main-page').style.display = 'block';
                document.getElementById('booking-page').style.display = 'none';
                window.scrollTo(0, 0);
            } else {
                document.getElementById('main-page').style.display = 'none';
                document.getElementById('booking-page').style.display = 'block';
                window.scrollTo(0, 0);
            }
        }

        // Pilih paket dan scroll ke form
        function selectAndScroll(packageName) {
            document.getElementById('selectPaket').value = packageName;
            document.getElementById('form-section').scrollIntoView({ behavior: 'smooth' });
        }

        document.getElementById('date').min = new Date().toISOString().split("T")[0];

        // WhatsApp redirect
        document.getElementById('waForm').onsubmit = function (e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const paket = document.getElementById('selectPaket').value;
            const phoneAdmin = "62895602491241"; 

            const text = `Halo ROCAA Photography,\n\nSaya *${name}* ingin booking paket *${paket}*.\nMohon informasi ketersediaan jadwal.`;
            window.open(`https://wa.me/${phoneAdmin}?text=${encodeURIComponent(text)}`);
        };
    </script>
</body>

</html>
